  <!-- Contenido del carrito -->
  <section class="container my-5">
    <h2 class="text-center mb-4">Tus productos seleccionados</h2>
    <div id="carrito-contenido" class="row gy-4"></div>

    <div class="text-center mt-4">
      <h4 id="total-pagar" class="mb-3"></h4>
      <button class="btn btn-success me-2" onclick="finalizarCompra()">Finalizar compra</button>
      <button class="btn btn-danger" onclick="vaciarCarrito()">Vaciar carrito</button>
    </div>
  </section>

  <!-- Bootstrap JS -->

  <!-- Script del carrito  -->
  <script>
    function cargarCarrito() {
      const carrito = JSON.parse(localStorage.getItem("carritoUrbanCops")) || [];
      const contenedor = document.getElementById("carrito-contenido");
      const totalTexto = document.getElementById("total-pagar");
      contenedor.innerHTML = "";

      if (carrito.length === 0) {
        contenedor.innerHTML = '<p class="text-center">Tu carrito está vacío.</p>';
        totalTexto.textContent = "";
        return;
      }

      let total = 0;
      carrito.forEach((item, index) => {
        if (!item.cantidad) item.cantidad = 1;
        const subtotal = item.precio * item.cantidad;
        total += subtotal;

        const productoHTML = `
          <div class="col-12 col-sm-6 col-md-4 col-lg-3">
            <div class="card producto-card text-white bg-dark border-light h-100">
              <img src="${item.imagen || 'img/default_gorra.png'}" 
     class="card-img-top img-fluid" 
     alt="${item.nombre}" 
     style="max-height: 200px; object-fit: contain;">

              <div class="card-body d-flex flex-column justify-content-between">
                <h5 class="card-title">${item.nombre}</h5>
                <p class="card-text fw-bold">Precio unidad: $${item.precio.toLocaleString()} COP</p>
                <div class="d-flex justify-content-center align-items-center mb-2">
                  <button class="btn btn-outline-light btn-sm me-2" onclick="cambiarCantidad(${index}, -1)">-</button>
                  <span class="fw-bold">${item.cantidad}</span>
                  <button class="btn btn-outline-light btn-sm ms-2" onclick="cambiarCantidad(${index}, 1)">+</button>
                </div>
                <p class="card-text">Subtotal: $${subtotal.toLocaleString()} COP</p>
                <button class="btn btn-outline-danger btn-sm mt-2" onclick="eliminarProducto(${index})">
                  <i class="bi bi-trash"></i> Eliminar
                </button>
              </div>
            </div>
          </div>
        `;
        contenedor.innerHTML += productoHTML;
      });

      totalTexto.textContent = `Total a pagar: $${total.toLocaleString()} COP`;

    }

    function cambiarCantidad(index, cambio) {
      const carrito = JSON.parse(localStorage.getItem("carritoUrbanCops")) || [];
      carrito[index].cantidad = Math.max(1, (carrito[index].cantidad || 1) + cambio);
      localStorage.setItem("carritoUrbanCops", JSON.stringify(carrito));
      cargarCarrito();
    }

    function eliminarProducto(index) {
      const carrito = JSON.parse(localStorage.getItem("carritoUrbanCops")) || [];
      carrito.splice(index, 1);
      localStorage.setItem("carritoUrbanCops", JSON.stringify(carrito));
      cargarCarrito();
    }

    function vaciarCarrito() {
      localStorage.removeItem("carritoUrbanCops");
      cargarCarrito();
    }

    function finalizarCompra() {
      alert("¡Gracias por tu compra! Tu pedido ha sido procesado.");
      localStorage.removeItem("carritoUrbanCops");
      cargarCarrito();
    }

    document.addEventListener("DOMContentLoaded", cargarCarrito);
  </script>
