name: urban_flutter
description: "URBAN COPS - Tienda de Gorras"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  http: ^1.1.0
  shared_preferences: ^2.2.2
  jwt_decode: ^0.3.1
  intl: ^0.18.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/img/
    - assets/img/Bulls/
    - assets/img/arizona/
    - assets/img/atlanta/
    - assets/img/boston/
    - assets/img/Braves/
    - assets/img/Lakers/
    - assets/img/Red/
    - assets/img/Sox/
    - assets/img/vegas/